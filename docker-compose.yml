version: '3.8'

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    container_name: whatsapp_ai_api
    ports:
      - "8000:8000"
    environment:
      - PORT=8000
    env_file:
      - .env
    restart: unless-stopped

  bot:
    build:
      context: .
      dockerfile: Dockerfile.bot
    container_name: whatsapp_bot
    environment:
      # El bot se comunica con el contenedor "api" usando el nombre del servicio
      - PYTHON_API_URL=http://api:8000/chat
    env_file:
      - .env
    depends_on:
      - api
    volumes:
      # Guardar persistencia de la sesión de whatsapp web localmente
      - .wwebjs_auth:/app/.wwebjs_auth
      - .wwebjs_cache:/app/.wwebjs_cache
    restart: unless-stopped
